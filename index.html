<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>essential-english-grammar</title>
    <script>
      // GitHub Pages SPA: restore the real path from 404.html redirect
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          params.delete('p');
          var q = params.get('q');
          params.delete('q');
          var search = q ? decodeURIComponent(q) : '';
          var remaining = params.toString();
          if (remaining) search = (search ? search + '&' : '?') + remaining;
          window.history.replaceState(null, '', '/essential-english-grammar' + decodeURIComponent(p) + search);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
